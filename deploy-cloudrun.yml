name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - "vless-cloudrun/**"
      - ".github/workflows/deploy-cloudrun.yml"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: cloudrun-ws-xhttp
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/cloudrun-ws-xhttp

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Kod al ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. GCP kimlik doğrulama ──────────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. gcloud CLI kur ────────────────────────────────────────────────
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # ── 4. Docker: GCR için auth ─────────────────────────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── 5. Docker image build & push ─────────────────────────────────────
      - name: Build & Push Docker image
        working-directory: vless-cloudrun
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 6. Cloud Run deploy ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 3600 \
            --set-env-vars UPSTREAM_URL=https://45.61.163.95:443

      # ── 7. Deploy URL'yi göster ───────────────────────────────────────────
      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
